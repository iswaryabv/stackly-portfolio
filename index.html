<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stackly Auth</title>

  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome for icons (user, email, lock, Google) -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
    }

    .font-welcome-heading {
      font-family: "Times New Roman", Georgia, serif;
      letter-spacing: 0.55em;
      font-weight: 600;
    }
  </style>
</head>

<body class="bg-white antialiased">

  <script>
    const HEALTH_URL = "http://localhost:5000/health";

    function showPage(page) {
      document.getElementById("signupPage").classList.add("hidden");
      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("errorPage").classList.add("hidden");

      document.getElementById(page + "Page").classList.remove("hidden");
    }

    async function checkBackendAndProceed(onSuccess) {
      try {
        const res = await fetch(HEALTH_URL);
        if (!res.ok) {
          showPage("error");
          return;
        }
        if (typeof onSuccess === "function") onSuccess();
      } catch (e) {
        showPage("error");
      }
    }

    async function handleSignup() {
      await checkBackendAndProceed(() => {
        alert("Signup successful!");
      });
    }

    async function handleLogin() {
      await checkBackendAndProceed(() => {
        alert("Login successful!");
      });
    }
  </script>

  <!-- ================= SIGNUP PAGE (Home /) ================= -->
  <div id="signupPage" class="h-screen bg-white flex items-stretch justify-center px-6">
    <div class="w-full max-w-6xl flex flex-col lg:flex-row items-stretch justify-between gap-10">
      <!-- LEFT SIDE IMAGE -->
      <div class="w-full lg:w-1/2 flex items-center justify-center py-10 lg:py-0">
        <!-- Use same path as Next app (add file to /public) -->
        <img
          src="/illustration.png"
          alt="Illustration"
          class="w-[85%] sm:w-[80%] lg:w-[88%] max-w-[520px] object-contain"
        />
      </div>

      <!-- RIGHT SIDE CARD -->
      <div class="w-full lg:w-1/2 flex items-stretch justify-center">
        <!-- Outer blue block -->
        <div
          class="
            relative
            overflow-hidden
            w-full 
            max-w-[520px]
            lg:h-full
            bg-gradient-to-b
            from-[#5f82e8]
            via-[#3f66c9]
            to-[#021a46]
            rounded-[10px]
            shadow-[0_55px_120px_rgba(0,0,0,0.6)]
            px-10
          "
        >
          <!-- Inner panel effect -->
          <div
            class="
              pointer-events-none
              absolute
              inset-y-0
              left-1/2
              w-[78%]
              -translate-x-1/2
              bg-gradient-to-b
              from-white/10
              via-black/10
              to-black/35
            "
          ></div>
          <div
            class="
              pointer-events-none
              absolute
              inset-0
              rounded-[10px]
              shadow-[inset_20px_0_45px_rgba(0,0,0,0.55),inset_-20px_0_45px_rgba(0,0,0,0.55)]
            "
          ></div>
          <div
            class="
              pointer-events-none
              absolute
              inset-0
              rounded-[10px]
              shadow-[inset_0_0_0_1px_rgba(0,0,0,0.25)]
            "
          ></div>

          <div class="relative z-10 h-full px-10 pt-14 pb-10 text-white">
            <!-- WELCOME -->
            <h1 class="font-welcome-heading text-2xl sm:text-3xl text-center font-semibold mb-7">
              WELCOME
            </h1>

            <!-- LOGO -->
            <div class="flex justify-center mb-8">
              <div
                class="
                  bg-white
                  w-[180px] sm:w-[220px]
                  h-[70px] sm:h-[85px]
                  rounded-[50%]
                  flex items-center justify-center
                  shadow-lg
                "
              >
                <!-- Use same path as Next app (add file to /public) -->
                <img
                  src="/stackly-logo.png"
                  alt="Stackly Logo"
                  class="h-6 sm:h-8 object-contain"
                />
              </div>
            </div>

            <!-- INPUTS -->
            <div class="space-y-6">
              <div class="flex items-center border-b border-white/60 pb-2">
                <i class="fa-solid fa-user mr-4 text-sm opacity-80"></i>
                <input
                  id="signupName"
                  type="text"
                  placeholder="Name"
                  class="bg-transparent outline-none w-full placeholder-white text-sm"
                />
              </div>

              <div class="flex items-center border-b border-white/60 pb-2">
                <i class="fa-solid fa-envelope mr-4 text-sm opacity-80"></i>
                <input
                  id="signupEmail"
                  type="email"
                  placeholder="Email"
                  class="bg-transparent outline-none w-full placeholder-white text-sm"
                />
              </div>

              <div class="flex items-center border-b border-white/60 pb-2">
                <i class="fa-solid fa-lock mr-4 text-sm opacity-80"></i>
                <input
                  id="signupPassword"
                  type="password"
                  placeholder="Password"
                  class="bg-transparent outline-none w-full placeholder-white text-sm"
                />
              </div>
            </div>

            <!-- SIGNUP BUTTON -->
            <button
              onclick="handleSignup()"
              class="
                mt-10
                w-full
                h-[45px]
                bg-gradient-to-r
                from-[#2d8cf0]
                to-[#5a78c7]
                rounded-md
                text-sm
                font-medium
                shadow-md
                hover:opacity-90
                transition
              "
            >
              SignUp
            </button>

            <!-- LOGIN LINK -->
            <p class="text-center text-xs mt-4 opacity-90">
              Already have an account?
              <button
                type="button"
                onclick="showPage('login')"
                class="text-yellow-400 cursor-pointer hover:text-yellow-300 underline-offset-2"
              >
                Login
              </button>
            </p>

            <!-- DIVIDER -->
            <div
